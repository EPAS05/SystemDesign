<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoprotmatRU</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
    <div class="tabs">
        <button class="tab-btn active" data-tab="navigator">Главная</button>
        <button class="tab-btn" data-tab="products">Продукты</button>
        <button class="tab-btn" data-tab="enums">Перечисления</button>
        <button class="tab-btn" data-tab="units">Единицы измерения</button>
    </div>

    <div id="navigatorTab" class="tab-content active">
        <div class="navigator-layout">
            <div class="navigator-panel">
                <h2>SoprotmatRU</h2>
                <div id="treeContainer">Загрузка</div>
            </div>
            <div class="main-panel">
                <div class="action-bar">
                    <button id="btnAddChild">Добавить узел</button>
                    <button id="btnEditUnits">Редактировать ЕИ</button>
                    <button id="btnDeleteNode" class="danger">Удалить</button>
                    <div class="selected-info" id="selectedInfo">Ничего не выбрано</div>
                </div>
                <div id="rightPanel" style="background-color: #ffffff; border-radius: 15px; margin: 16px;">
                    <h3 id="rightPanelTitle">Выберите категорию слева</h3>
                    <div id="rightChildrenList">...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="productsTab" class="tab-content">
        <div class="crud-panel">
            <h2>Продукты</h2>
            <div class="crud-toolbar">
                <button id="btnCreateProduct">Создать продукт</button>
                <button id="btnRefreshProducts">Обновить</button>
            </div>
            <div id="productsList" class="data-table">Загрузка</div>
        </div>
    </div>

    <div id="enumsTab" class="tab-content">
        <div class="crud-panel">
            <h2>Перечисления</h2>
            <div class="crud-toolbar">
                <button id="btnCreateEnum">Создать перечисление</button>
                <button id="btnRefreshEnums">Обновить</button>
            </div>
            <div id="enumsList" class="data-table">Загрузка</div>
        </div>
    </div>

    <div id="unitsTab" class="tab-content">
        <div class="crud-panel">
            <h2>Единицы измерения</h2>
            <div class="crud-toolbar">
                <button id="btnCreateUnit">Создать единицу</button>
                <button id="btnRefreshUnits">Обновить</button>
            </div>
            <div id="unitsList" class="data-table">Загрузка</div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
